# Next.js Frontend Application Deployment & Service
apiVersion: v1
kind: Service
metadata:
  name: noun-frontend-service
  namespace: noun-hrms
  labels:
    app: noun-frontend
spec:
  ports:
    - port: 80
      targetPort: 3000
      name: http
  selector:
    app: noun-frontend
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noun-frontend-deployment
  namespace: noun-hrms
  labels:
    app: noun-frontend
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0%
  selector:
    matchLabels:
      app: noun-frontend
  template:
    metadata:
      labels:
        app: noun-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend-container
          image: noun-hrms-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: noun-hrms-config
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1024Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
