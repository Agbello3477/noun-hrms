apiVersion: v1
kind: Namespace
metadata:
  name: noun-hrms
---
# Express Backend API Service
apiVersion: v1
kind: Service
metadata:
  name: noun-api-service
  namespace: noun-hrms
spec:
  ports:
    - port: 80
      targetPort: 5055
  selector:
    app: noun-api
  type: ClusterIP
---
# Express Backend API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noun-api-deployment
  namespace: noun-hrms
spec:
  replicas: 10 # Default baseline replica count
  selector:
    matchLabels:
      app: noun-api
  template:
    metadata:
      labels:
        app: noun-api
    spec:
      containers:
        - name: noun-api-container
          image: noun-hrms-server:latest
          ports:
            - containerPort: 5055
          env:
            - name: PORT
              value: "5055"
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres_password@pgbouncer-service:6432/noun_hrms?schema=public&connection_limit=10"
            - name: REDIS_URL
              value: "redis://redis-cluster-service:6379"
            - name: JWT_SECRET
              value: "prod_super_secret_jwt_key"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /api/health # Health endpoint
              port: 5055
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5055
            initialDelaySeconds: 30
            periodSeconds: 20
---
# Next.js Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: noun-client-service
  namespace: noun-hrms
spec:
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: noun-client
  type: ClusterIP
---
# Next.js Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noun-client-deployment
  namespace: noun-hrms
spec:
  replicas: 5 # Default baseline replica count
  selector:
    matchLabels:
      app: noun-client
  template:
    metadata:
      labels:
        app: noun-client
    spec:
      containers:
        - name: noun-client-container
          image: noun-hrms-client:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              value: "https://hrms.noun.edu.ng/api"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
# Auto-scaling Configuration (HPA) for Express API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: noun-api-hpa
  namespace: noun-hrms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: noun-api-deployment
  minReplicas: 10
  maxReplicas: 80 # Autoscale up to 80 pods for 50,000+ users peak load
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 # Autoscale when CPU usage hits 70%
---
# Auto-scaling Configuration (HPA) for Next.js Client
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: noun-client-hpa
  namespace: noun-hrms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: noun-client-deployment
  minReplicas: 5
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Ingress Controller Routing Configurations
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: noun-ingress
  namespace: noun-hrms
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "15"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  rules:
    - host: hrms.noun.edu.ng
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: noun-api-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: noun-client-service
                port:
                  number: 80
