[databases]
noun_hrms = host=db-primary port=5432 dbname=noun_hrms auth_user=postgres

[pgbouncer]
logfile = /var/log/postgresql/pgbouncer.log
pidfile = /var/run/postgresql/pgbouncer.pid

listen_addr = *
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Connection Pool Settings optimized for 50,000+ users
pool_mode = transaction
max_client_conn = 10000
default_pool_size = 100
min_pool_size = 20
reserve_pool_size = 10
reserve_pool_timeout = 5

# Idle connection timeouts to recycle database handles aggressively
server_idle_timeout = 10
client_idle_timeout = 60
client_login_timeout = 15
query_timeout = 30
