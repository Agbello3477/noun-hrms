name: Anti-Sleep Keep-Alive

on:
  schedule:
    # Run every 10 minutes to prevent Render (15 min sleep) and Firebase from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  ping-servers:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API (Render)
        run: curl -s -o /dev/null -w "%{http_code}" https://noun-hrms.onrender.com/
        
      - name: Ping Frontend SSR (Firebase)
        run: curl -s -o /dev/null -w "%{http_code}" https://nounhrms.web.app/
