events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance Tuning for Concurrency
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip Compression to optimize Nigerian network latency
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Client Nodes Upstream (Next.js)
    upstream client_servers {
        least_conn; # Route to server with fewest active connections
        server client-1:3000 max_fails=3 fail_timeout=10s;
        server client-2:3000 max_fails=3 fail_timeout=10s;
    }

    # API Nodes Upstream (Express Server)
    upstream api_servers {
        least_conn;
        server server-1:5055 max_fails=3 fail_timeout=10s;
        server server-2:5055 max_fails=3 fail_timeout=10s;
        server server-3:5055 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name localhost;

        # Redirect API routes to API servers
        location /api/ {
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts to handle slow network clients elegantly
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Redirect uploads directly to API servers
        location /uploads/ {
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            expires 30d; # Cache static uploaded images locally for performance
            add_header Cache-Control "public, no-transform";
        }

        # Route all other traffic to Next.js clients
        location / {
            proxy_pass http://client_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
