version: '3.8'

services:
  # Nginx Load Balancer
  load_balancer:
    image: nginx:alpine
    container_name: noun_nginx_lb
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - client-1
      - client-2
      - server-1
      - server-2
      - server-3
    restart: unless-stopped
    networks:
      - noun_network

  # Next.js Frontend Instances
  client-1:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: noun_client_1
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost/api
    restart: unless-stopped
    networks:
      - noun_network

  client-2:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: noun_client_2
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost/api
    restart: unless-stopped
    networks:
      - noun_network

  # Express Backend API Instances
  server-1:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: noun_server_1
    environment:
      - PORT=5055
      - DATABASE_URL=postgresql://postgres:postgres_password@db-primary:5432/noun_hrms?schema=public&connection_limit=30&pool_timeout=15
      - DATABASE_URL_REPLICA=postgresql://postgres:postgres_password@db-replica:5432/noun_hrms?schema=public&connection_limit=30&pool_timeout=15
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=prod_super_secret_jwt_key
    depends_on:
      - db-primary
      - redis
    restart: unless-stopped
    networks:
      - noun_network

  server-2:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: noun_server_2
    environment:
      - PORT=5055
      - DATABASE_URL=postgresql://postgres:postgres_password@db-primary:5432/noun_hrms?schema=public&connection_limit=30&pool_timeout=15
      - DATABASE_URL_REPLICA=postgresql://postgres:postgres_password@db-replica:5432/noun_hrms?schema=public&connection_limit=30&pool_timeout=15
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=prod_super_secret_jwt_key
    depends_on:
      - db-primary
      - redis
    restart: unless-stopped
    networks:
      - noun_network

  server-3:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: noun_server_3
    environment:
      - PORT=5055
      - DATABASE_URL=postgresql://postgres:postgres_password@db-primary:5432/noun_hrms?schema=public&connection_limit=30&pool_timeout=15
      - DATABASE_URL_REPLICA=postgresql://postgres:postgres_password@db-replica:5432/noun_hrms?schema=public&connection_limit=30&pool_timeout=15
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=prod_super_secret_jwt_key
    depends_on:
      - db-primary
      - redis
    restart: unless-stopped
    networks:
      - noun_network

  # Background Queue Worker Instance (Task 4)
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: noun_worker_1
    command: npm run start # Custom entrypoint can run ts-node dist/worker.js or similar
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password@db-primary:5432/noun_hrms?schema=public&connection_limit=10
      - REDIS_URL=redis://redis:6379
      - IS_WORKER=true
    depends_on:
      - db-primary
      - redis
    restart: unless-stopped
    networks:
      - noun_network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: noun_redis_prod
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    networks:
      - noun_network

  # Primary PostgreSQL Database (Writes)
  db-primary:
    image: postgres:15-alpine
    container_name: noun_db_primary
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=noun_hrms
    volumes:
      - db_primary_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - noun_network

  # Read Replica PostgreSQL Database (Reads)
  db-replica:
    image: postgres:15-alpine
    container_name: noun_db_replica
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=noun_hrms
    volumes:
      - db_replica_data:/var/lib/postgresql/data
    depends_on:
      - db-primary
    restart: unless-stopped
    networks:
      - noun_network

volumes:
  redis_prod_data:
  db_primary_data:
  db_replica_data:

networks:
  noun_network:
    driver: bridge
